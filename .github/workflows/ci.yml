name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'integration'
        type: choice
        options:
          - integration
          - full-integration (with examples)
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format check ─────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Check formatting
        run: just fmt-check

  # ── Clippy (lint) ─────────────────────────────────────────────────────────────
  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Run Clippy
        run: just lint

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build workspace (debug)
        run: just build

  # ── Unit tests ────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Run unit tests (no PostgreSQL required)
        run: just test

  # ── Integration tests (with PostgreSQL) ───────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: zart
          POSTGRES_PASSWORD: zart
          POSTGRES_DB: zart
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zart -d zart"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://zart:zart@localhost:5432/zart

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U zart -d zart > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done
          echo "PostgreSQL failed to become ready"
          exit 1

      - name: Run integration tests
        run: just test-integration-core

  # ── Full integration tests (with PostgreSQL + internet for examples) ──────────
  test-integration-full:
    name: Full Integration Tests (with Examples)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: zart
          POSTGRES_PASSWORD: zart
          POSTGRES_DB: zart
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zart -d zart"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://zart:zart@localhost:5432/zart

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U zart -d zart > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done
          echo "PostgreSQL failed to become ready"
          exit 1

      - name: Run full integration tests (including examples with external APIs)
        run: just test-integration-full

  # ── UI (zart-ui) ──────────────────────────────────────────────────────────────
  ui:
    name: UI (type-check + tests + docker build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: zart-ui/package-lock.json

      - name: Install dependencies
        working-directory: zart-ui
        run: npm ci

      - name: Type-check & bundle
        working-directory: zart-ui
        run: npm run build

      - name: Unit tests
        working-directory: zart-ui
        run: npm run test:run

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build smoke test (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./zart-ui
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Documentation ─────────────────────────────────────────────────────────────
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build documentation
        run: just doc-check
        env:
          RUSTDOCFLAGS: "-D warnings"
