name: Publish UI Docker Image

# Triggers:
#   - Manual workflow_dispatch with image_tag input
#
# Required secrets (via environment dockerhub):
#   DOCKERHUB_USERNAME  — your Docker Hub username / org
#   DOCKERHUB_TOKEN     — Docker Hub access token (not password)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g., 0.1.0)"
        required: true
        default: "latest"

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push zart-ui
    runs-on: ubuntu-latest
    environment: dockerhub

    steps:
      - uses: actions/checkout@v4

      # ── Node / npm (needed only to regenerate package-lock if missing) ─────────
      # The actual build happens inside Docker; this step just validates the
      # lock file is present so the Docker cache layer stays stable.
      - name: Verify package-lock.json exists
        run: test -f zart-ui/package-lock.json

      # ── Docker setup ────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Compute tags ─────────────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/zart-ui
          tags: |
            type=raw,value=${{ github.event.inputs.image_tag }}

      # ── Build & push ─────────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./zart-ui
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache backed by GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
