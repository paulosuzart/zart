services:
  postgres:
    image: postgres:17-alpine
    container_name: zart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zart
      POSTGRES_PASSWORD: zart
      POSTGRES_DB: zart
    ports:
      - "5432:5432"
    volumes:
      - zart-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zart -d zart"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  zart-pgdata:
    driver: local
