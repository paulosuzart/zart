server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Zart API calls to the backend process.
    # When running via docker-compose, the backend is on the host machine.
    # host.docker.internal resolves to the host on macOS and Linux (with extra_hosts).
    location /api/ {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # SPA routing — unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
