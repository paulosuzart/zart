server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Zart API calls to the backend process.
    # API_URL env var defaults to host.docker.internal:3000 (for docker-compose).
    # Set API_URL=https://your-api.example.com for production.
    location /api/ {
        proxy_pass ${API_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass ${API_URL}/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # SPA routing — unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
