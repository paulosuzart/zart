services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zart-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    # host.docker.internal → host machine (macOS native; extra_hosts makes it
    # work on Linux too). nginx proxies /api and /admin to the Zart backend
    # running on the host at port 3000.
    extra_hosts:
      - "host.docker.internal:host-gateway"
